name: Atualizador Lotofacil

on:
  schedule:
    # -----------------------------------------------------------------
    # CONFERÊNCIAS DURANTE O DIA (Horário de Brasília)
    # -----------------------------------------------------------------
    # 12:00 UTC = 09:00 BRT
    - cron: '0 12 * * *'
    # 15:00 UTC = 12:00 BRT (Meio-dia)
    - cron: '0 15 * * *'
    # 18:00 UTC = 15:00 BRT
    - cron: '0 18 * * *'
    # 21:00 UTC = 18:00 BRT (Fim da tarde)
    - cron: '0 21 * * *'

    # -----------------------------------------------------------------
    # CONFERÊNCIAS CRÍTICAS DA NOITE (Seus horários originais mantidos)
    # -----------------------------------------------------------------
    # 00:15 UTC = 21:15 BRT
    - cron: '15 0 * * *'
    # 00:35 UTC = 21:35 BRT
    - cron: '35 0 * * *'
    # 00:55 UTC = 21:55 BRT
    - cron: '55 0 * * *'
    # 01:15 UTC = 22:15 BRT
    - cron: '15 1 * * *'
    
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Baixar repositório
        uses: actions/checkout@v3

      - name: Ajustar Fuso Horário (Visualização)
        run: sudo timedatectl set-timezone America/Sao_Paulo

      - name: Instalar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Instalar bibliotecas
        run: pip install requests

      - name: Rodar script
        run: python update_loto.py

      - name: Salvar mudanças
        run: |
          git config --global user.name 'LotoBot'
          git config --global user.email 'bot@noreply.github.com'
          git add api/*.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update Lotofacil: $(date +'%d/%m/%Y %H:%M')" && git push)
